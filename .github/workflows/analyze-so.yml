name: Analyze liblspatch.so v3

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Full analysis
        run: |
          SO="./app/src/main/assets/lspatch/so/arm64-v8a/liblspatch.so"

          echo "========== ELF HEADER =========="
          readelf -h "$SO"

          echo ""
          echo "========== SECTIONS =========="
          readelf -S "$SO"

          echo ""
          echo "========== DYNAMIC =========="
          readelf -d "$SO"

          echo ""
          echo "========== SYMBOLS (ALL) =========="
          # FIX: thêm || true để không exit code 1
          nm -D "$SO" 2>/dev/null || true

          echo ""
          echo "========== JNI Functions =========="
          nm -D "$SO" 2>/dev/null | grep -i "java_" || echo "No JNI functions found"

          echo ""
          echo "========== STRINGS: Android/API =========="
          strings "$SO" | grep -iE "android|api|sdk|ndk|level" | sort -u || true

          echo ""
          echo "========== STRINGS: Patch related =========="
          strings "$SO" | grep -iE "patch|hook|inject|xposed|lsposed|dex|dalvik" | sort -u || true

          echo ""
          echo "========== STRINGS: File paths =========="
          strings "$SO" | grep -E "^/|\.so$|\.dex$|\.apk$" | sort -u || true

          echo ""
          echo "========== STRINGS: ALL (first 300) =========="
          strings "$SO" | sort -u | head -300

          echo ""
          echo "========== HEX: Search Android note =========="
          hexdump -C "$SO" | grep -A2 "ndroid" | head -20 || true

      - name: Check Java side (lspatch.aar)
        run: |
          echo "========== FIND AAR/JAR =========="
          find . -name "*.aar" -o -name "lspatch*.jar" | head -10
          
          echo ""
          echo "========== FIND LSPatch Java classes =========="
          find . -path "*/lspatch*" -type f | head -30

          echo ""
          echo "========== CHECK build.gradle for lspatch =========="
          grep -rn "lspatch\|LSPatch\|liblspatch" --include="*.gradle*" --include="*.kt" --include="*.java" . | head -30

      - name: Check minSdk references in source
        run: |
          echo "========== minSdk references =========="
          grep -rn "minSdk\|MIN_SDK\|Build.VERSION" --include="*.kt" --include="*.java" . | head -30
          
          echo ""
          echo "========== API level checks in code =========="
          grep -rn "VERSION_CODES\|SDK_INT" --include="*.kt" --include="*.java" . | head -30

      - name: Android 7 compatibility check
        run: |
          SO="./app/src/main/assets/lspatch/so/arm64-v8a/liblspatch.so"

          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║         ANDROID 7 COMPATIBILITY CHECK            ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║                                                  ║"

          # Check từng function có trên Android 7 không
          PROBLEMS=0

          # Các function chỉ có từ API 28+
          for func in "__libc_current_sigrtmin" "android_fdsan_close_with_tag" "android_fdsan_create_owner_tag"; do
            if nm -D "$SO" 2>/dev/null | grep -q "$func"; then
              echo "║  ❌ $func (API 28+ only)"
              PROBLEMS=$((PROBLEMS + 1))
            fi
          done

          # Các function chỉ có từ API 26+  
          for func in "fexecve" "preadv2" "pwritev2"; do
            if nm -D "$SO" 2>/dev/null | grep -q "$func"; then
              echo "║  ❌ $func (API 26+ only)"
              PROBLEMS=$((PROBLEMS + 1))
            fi
          done

          if [ "$PROBLEMS" -eq 0 ]; then
            echo "║  ✅ Tất cả symbols đều compatible API 24!     ║"
            echo "║  ✅ liblspatch.so CHẠY ĐƯỢC Android 7!        ║"
          else
            echo "║  ❌ Có $PROBLEMS symbols không compatible      ║"
          fi

          echo "║                                                  ║"
          echo "║  Exported: JNI_OnLoad only                      ║"
          echo "║  → Library tự hook khi được load                ║"
          echo "║  → Không cần Java JNI interface                 ║"
          echo "║  → Đây là injection/hooking library             ║"
          echo "║                                                  ║"
          echo "╚══════════════════════════════════════════════════╝"
