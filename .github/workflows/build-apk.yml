name: Kettu Manager (Android 7) 🦊

on:
  workflow_dispatch: # Cho phép bấm nút Build bằng tay 😈
  push:
    branches: [ "main", "master" ] # Tự build khi có code mới push lên

jobs:
  build-apk:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # BẮT BUỘC: Để các lệnh git trong build.gradle.kts hoạt động!

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔑 Cấp quyền thực thi cho Gradle
        run: chmod +x gradlew

      - name: 🧪 Fetch, forge and push NPatch AAR to Repo
        run: |
          curl -sSL -o npatch.jar https://github.com/7723mod/NPatch/releases/download/v0.8.0/jar-v0.8.0-538-release.jar
          unzip -q npatch.jar "META-INF/**"
          mv npatch.jar classes.jar
          touch R.txt
          cat >AndroidManifest.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="org.lsposed.patch.npatch">
              <uses-sdk android:minSdkVersion="24" android:targetSdkVersion="34" />
          </manifest>
          EOF
          zip -rq npatch.aar R.txt AndroidManifest.xml META-INF classes.jar
          mkdir -p app/libs/
          mv npatch.aar app/libs/
          rm -rf META-INF AndroidManifest.xml classes.jar R.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/libs/npatch.aar
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-forge and add npatch.aar to libs"
            git push
          fi
      
      - name: 🔨 Build Debug APK (Android 7 Ready)
        run: ./gradlew assembleDebug --stacktrace

      - name: 📤 Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: Kettu-Manager-Android7-Debug
          path: app/build/outputs/apk/debug/**/*.apk
          retention-days: 30
